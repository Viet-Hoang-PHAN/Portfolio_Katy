# Décommenter uniquement en développement local :
# local_backend: true
# Commande pour lancer Decap en local : npx decap-server

backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)

media_folder: "public/upload"
public_folder: "/"

site_url: https://sailsnake-decapcms.netlify.app

media_library:
  name: cloudinary
  config:
    cloud_name: dvslwsa0d
    api_key: 166261252296815


# SEO anchor:
seo: &seo
  name: "SEOmetaData"
  label: "SEO"
  widget: "object"
  collapsed: true
  fields: 
    - { name: "metaTitle", label: "SEO Title", widget: "string", default: "{{ title }}", required: true }
    - { name: "metaDescription", label: "SEO Description", widget: "string", pattern: [".{20,160}", "between 20 and 160 characters"], required: true, hint: "must be between 20 and 160 characters" }
    - { name: "metaImage", label: "SEO image", widget: "image"}
    - { name: "keywords", label: "keywords", widget: "string", hint: "keywords are comma seperated", required: false }



collections:
  - name: "globalContent"
    label: "Contenu global"
    files:
      - label: "Site"
        name: "site"
        file: "content/settings/site.md"
        fields:
          - { name: "siteName", label: "Nom du site", widget: "string" }
          - { name: "tagline", label: "Tagline", widget: "string", required: false }

      - label: "Navigation"
        name: "navigation"
        file: "content/settings/navigation.md"
        fields:
          - label: "Liens"
            name: "items"
            widget: "list"
            fields:
              - { name: "label", label: "Libellé", widget: "string" }
              - { name: "path", label: "URL", widget: "string" }

      - label: "Boutons"
        name: "buttons"
        file: "content/components/buttons.md"
        fields:
          - { name: "next", label: "Suivant", widget: "string" }
          - { name: "previous", label: "Précédent", widget: "string" }
          - { name: "close", label: "Fermer", widget: "string" }
          - { name: "article", label: "Lire la suite", widget: "string", default: "Lire la suite" }
          - { name: "send", label: "Envoyer", widget: "string" }
        
  # SINGLE PAGES
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home"
        file: "content/pages/home.md"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "content", label: "Content", widget: "markdown" }
          - *seo
      - name: "about"
        label: "À propos"
        file: "content/pages/about.md"
        fields:
          - { name: "title", label: "Titre", widget: "string" }
          - { name: "photo", label: "Photo", widget: "image", required: false }
          - { name: "content", label: "Contenu", widget: "markdown" }
          - *seo

      - name: "contact"
        label: "Contact"
        file: "content/pages/contact.md"
        fields:
          - { name: "title", label: "Titre", widget: "string" }
          - { name: "intro", label: "Introduction", widget: "text", required: false }
          - { name: "email", label: "Email", widget: "string", required: false }
          - label: "Réseaux sociaux"
            name: "socialLinks"
            widget: "list"
            required: false
            fields:
              - { name: "label", label: "Libellé", widget: "string" }
              - { name: "url", label: "URL", widget: "string" }
          - *seo

      - name: "typography"
        label: "Typography"
        file: "content/pages/typography.md"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "content", label: "Content", widget: "markdown" }

  # PROJETS
  - name: "projets"
    label: "Projets"
    folder: "content/projets"
    create: true
    slug: "{{slug}}"
    preview_path: "projets/{{slug}}"
    fields:
      - { name: "title", label: "Titre", widget: "string" }
      - { name: "date", label: "Date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { name: "category", label: "Catégorie", widget: "string", required: false, hint: "ex: Photographie, Peinture, Illustration…" }
      - { name: "coverImage", label: "Image de couverture", widget: "image", required: false }
      - { name: "description", label: "Description courte", widget: "text", required: false, hint: "Affichée dans la grille et en introduction de la page projet" }
      - { name: "content", label: "Contenu", widget: "markdown", required: false }
      - label: "Galerie"
        name: "images"
        widget: "list"
        required: false
        fields:
          - { name: "image", label: "Image", widget: "image" }
          - { name: "caption", label: "Légende", widget: "string", required: false }
      - *seo
     

          

